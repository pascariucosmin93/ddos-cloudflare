---
apiVersion: v1
kind: Namespace
metadata:
  name: ip-monitor
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ip-monitor-app
  namespace: ip-monitor
data:
  app.py: |
    from http.server import BaseHTTPRequestHandler, HTTPServer
    from collections import deque
    from datetime import datetime
    import json, threading

    requests_log = deque(maxlen=200)
    lock = threading.Lock()

    def get_real_ip(headers):
        # Cloudflare real IP
        cf_ip = headers.get("CF-Connecting-IP") or headers.get("cf-connecting-ip")
        if cf_ip:
            return cf_ip, "CF-Connecting-IP"
        xff = headers.get("X-Forwarded-For") or headers.get("x-forwarded-for")
        if xff:
            return xff.split(",")[0].strip(), "X-Forwarded-For"
        return None, None

    class Handler(BaseHTTPRequestHandler):
        def log_message(self, *args):
            pass  # silence default logs

        def do_GET(self):
            headers = {k: v for k, v in self.headers.items()}
            real_ip, source = get_real_ip(headers)
            cf_country = headers.get("CF-IPCountry") or headers.get("cf-ipcountry") or "-"
            cf_ray = headers.get("CF-RAY") or headers.get("cf-ray") or "-"
            user_agent = headers.get("User-Agent") or headers.get("user-agent") or "-"

            entry = {
                "time": datetime.utcnow().strftime("%H:%M:%S"),
                "ip": real_ip or self.client_address[0],
                "source": source or "direct",
                "country": cf_country,
                "ray": cf_ray,
                "ua": user_agent[:80],
                "path": self.path,
            }

            if self.path == "/api/events":
                with lock:
                    self.send_response(200)
                    self.send_header("Content-Type", "application/json")
                    self.end_headers()
                    self.wfile.write(json.dumps(list(requests_log)).encode())
                return

            with lock:
                requests_log.appendleft(entry)

            html = self._render()
            self.send_response(200)
            self.send_header("Content-Type", "text/html; charset=utf-8")
            self.end_headers()
            self.wfile.write(html.encode())

        def _render(self):
            with lock:
                rows = list(requests_log)

            ip_counts = {}
            for r in rows:
                ip_counts[r["ip"]] = ip_counts.get(r["ip"], 0) + 1
            top = sorted(ip_counts.items(), key=lambda x: -x[1])[:10]

            top_html = "".join(
                f"<tr><td>{ip}</td><td>{cnt}</td></tr>" for ip, cnt in top
            )
            log_html = "".join(
                f"<tr><td>{r['time']}</td><td><b>{r['ip']}</b></td>"
                f"<td>{r['country']}</td><td>{r['source']}</td>"
                f"<td>{r['path']}</td><td style='font-size:11px;color:#888'>{r['ua'][:60]}</td></tr>"
                for r in rows[:100]
            )

            return f"""<!DOCTYPE html>
    <html>
    <head>
      <meta charset="utf-8">
      <title>IP Monitor</title>
      <meta http-equiv="refresh" content="5">
      <style>
        body {{ font-family: monospace; background: #0d1117; color: #c9d1d9; margin: 20px; }}
        h2 {{ color: #58a6ff; }}
        table {{ border-collapse: collapse; width: 100%; margin-bottom: 30px; }}
        th {{ background: #161b22; color: #8b949e; text-align: left; padding: 6px 10px; }}
        td {{ padding: 5px 10px; border-bottom: 1px solid #21262d; }}
        tr:hover td {{ background: #161b22; }}
        .badge {{ background: #388bfd26; color: #58a6ff; padding: 2px 6px; border-radius: 4px; font-size: 12px; }}
      </style>
    </head>
    <body>
      <h2>IP Monitor <span class="badge">auto-refresh 5s</span></h2>
      <h3>Top IP-uri ({len(rows)} requests totale)</h3>
      <table>
        <tr><th>IP</th><th>Requests</th></tr>
        {top_html}
      </table>
      <h3>Ultimele request-uri</h3>
      <table>
        <tr><th>Ora</th><th>IP Real</th><th>Tara</th><th>Sursa header</th><th>Path</th><th>User-Agent</th></tr>
        {log_html}
      </table>
    </body>
    </html>"""

    HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ip-monitor
  namespace: ip-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ip-monitor
  template:
    metadata:
      labels:
        app: ip-monitor
    spec:
      containers:
        - name: app
          image: python:3.12-alpine
          command: ["python", "/app/app.py"]
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: app
              mountPath: /app
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: app
          configMap:
            name: ip-monitor-app
---
apiVersion: v1
kind: Service
metadata:
  name: ip-monitor
  namespace: ip-monitor
spec:
  selector:
    app: ip-monitor
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ip-monitor-route
  namespace: ip-monitor
spec:
  parentRefs:
    - name: nginx-gateway
      namespace: nginx-demo
  hostnames:
    - "monitor.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: ip-monitor
          port: 80
