---
apiVersion: v1
kind: Namespace
metadata:
  name: app2
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-app2-html
  namespace: app2
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head><title>App 2</title></head>
    <body style="font-family:sans-serif;text-align:center;padding:60px;background:#fdf3e8;">
      <h1>Nginx App 2</h1>
      <p>Namespace: <strong>app2</strong></p>
    </body>
    </html>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-app2-conf
  namespace: app2
data:
  nginx.conf: |
    events {}
    http {
      map $http_cf_connecting_ip $real_ip {
        ""      $remote_addr;
        default $http_cf_connecting_ip;
      }

      log_format json_cf escape=json
        '{"time":"$time_iso8601",'
        '"ip":"$real_ip",'
        '"cf_ip":"$http_cf_connecting_ip",'
        '"xff":"$http_x_forwarded_for",'
        '"remote":"$remote_addr",'
        '"country":"$http_cf_ipcountry",'
        '"ray":"$http_cf_ray",'
        '"method":"$request_method",'
        '"path":"$request_uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"ua":"$http_user_agent"}';

      access_log /dev/stdout json_cf;
      error_log  /dev/stderr warn;

      server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-app2
  namespace: app2
  labels:
    app: nginx-app2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-app2
  template:
    metadata:
      labels:
        app: nginx-app2
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
            - name: conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: html
          configMap:
            name: nginx-app2-html
        - name: conf
          configMap:
            name: nginx-app2-conf
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-app2
  namespace: app2
spec:
  selector:
    app: nginx-app2
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
