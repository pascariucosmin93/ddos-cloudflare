apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ddos-agent
  namespace: ddos-protection
  labels:
    app: ddos-agent
spec:
  selector:
    matchLabels:
      app: ddos-agent
  template:
    metadata:
      labels:
        app: ddos-agent
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - operator: Exists
      imagePullSecrets:
        - name: ghcr-pull-secret
      initContainers:
        - name: load-conntrack
          image: busybox
          command: ["modprobe", "nf_conntrack"]
          securityContext:
            privileged: true
          volumeMounts:
            - name: lib-modules
              mountPath: /lib/modules
              readOnly: true
      containers:
        - name: agent
          image: ghcr.io/pascariucosmin93/ddos-agent:0.0.7
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          envFrom:
            - configMapRef:
                name: ddos-config
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
          volumeMounts:
            - name: proc
              mountPath: /host/proc/net
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: proc
          hostPath:
            path: /proc/net
            type: Directory
        - name: lib-modules
          hostPath:
            path: /lib/modules
            type: Directory
