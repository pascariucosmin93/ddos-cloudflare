apiVersion: v1
kind: Secret
metadata:
  name: ddos-cloudflare
  namespace: ddos-protection
type: Opaque
stringData:
  # Required for Cloudflare list operations
  CF_API_TOKEN: "replace-me"
  CF_ACCOUNT_ID: "replace-me"

  # Optional: set explicit API list id (not list name and not "$ddos_blocklist").
  # If omitted, agent resolves list id automatically from CF_LIST_NAME.
  # CF_LIST_ID: "replace-me"
