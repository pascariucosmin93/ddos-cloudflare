apiVersion: v1
kind: Secret
metadata:
  name: ddos-cloudflare
  namespace: ddos-protection
type: Opaque
stringData:
  # Required for Cloudflare list operations
  CF_API_TOKEN: "replace-me"
  CF_ACCOUNT_ID: "replace-me"

  # Recommended: set explicit list id to skip auto-discovery by name
  CF_LIST_ID: "replace-me"
