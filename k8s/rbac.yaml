apiVersion: v1
kind: ServiceAccount
metadata:
  name: ddos-controller
  namespace: ddos-protection
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ddos-controller
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "update", "patch"]
  - apiGroups: ["cilium.io"]
    resources: ["ciliumclusterwidenetworkpolicies"]
    verbs: ["get", "list", "create", "update", "replace", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ddos-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ddos-controller
subjects:
  - kind: ServiceAccount
    name: ddos-controller
    namespace: ddos-protection
