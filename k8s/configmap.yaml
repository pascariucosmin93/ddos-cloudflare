apiVersion: v1
kind: ConfigMap
metadata:
  name: ddos-config
  namespace: ddos-protection
data:
  # Loki — sursa de date
  LOKI_URL: "http://10.90.90.32:3100"
  LOKI_NAMESPACES: "cv|gaz"                  # namespace-uri monitorizate (regex)

  # Praguri
  THRESHOLD_RPM: "100"                       # requesturi/minut per IP
  BLOCK_TTL_SECONDS: "300"                   # 5 minute blocat
  POLL_INTERVAL_SECONDS: "30"                # interogare Loki la 30s
  HTTP_TIMEOUT_SECONDS: "10"

  # Provider blocare: cloudflare | cilium | both
  BLOCK_MODE: "cloudflare"
  POLICY_NAME: "ddos-blocklist"
  PROTECTED_NAMESPACES: "cv|gaz"

  # Shared blocklist for app-level filtering (CF-Connecting-IP)
  BLOCKLIST_SYNC_ENABLED: "true"
  BLOCKLIST_CONFIGMAP_NAMESPACE: "ddos-protection"
  BLOCKLIST_CONFIGMAP_NAME: "ddos-blocklist"
  BLOCKLIST_CONFIGMAP_KEY: "blocked_ips.txt"

  # Cloudflare (token/account/list in Secret)
  CF_LIST_NAME: "ddos_blocklist"
  CF_SYNC_ON_START: "true"

  # iptables fallback (pentru trafic direct, non-Cloudflare)
  ENABLE_IPTABLES: "false"
  PROTECTED_PORTS: "80,443"

  # IP-uri de incredere — nu se blocheaza niciodata
  TRUSTED_CIDRS: "10.90.90.0/24,192.168.70.0/24,127.0.0.1/32,10.244.0.0/16"
