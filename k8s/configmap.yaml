apiVersion: v1
kind: ConfigMap
metadata:
  name: ddos-config
  namespace: ddos-protection
data:
  # Agent config
  THRESHOLD_CONNECTIONS: "5"         # conexiuni de la acelasi IP in fereastra de timp
  THRESHOLD_WINDOW_SECONDS: "60"     # fereastra de timp in secunde
  BLOCK_TTL_SECONDS: "600"           # cat timp e blocat IP-ul (10 minute)
  POLL_INTERVAL_SECONDS: "10"        # cat de des citeste conntrack
  WHITELIST_IPS: "10.90.90.9,192.168.70.1"  # IP-uri de whitelistuit (router, etc.)

  # Controller config
  GLOBAL_BLOCK_THRESHOLD: "2"        # blocat pe >= N noduri → block global Cilium
  SYNC_INTERVAL_SECONDS: "15"        # cat de des agrega controllerul
