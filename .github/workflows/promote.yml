name: Promote

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: Existing source tag to promote, for example 0.0.42
        required: true
        type: string
      release_version:
        description: Release version, for example 1.0.0
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate release version
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          set -euo pipefail
          if ! [[ "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release_version must match x.y.z"
            exit 1
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image names
        id: img
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "agent=ghcr.io/$OWNER/ddos-agent" >> "$GITHUB_OUTPUT"
          echo "controller=ghcr.io/$OWNER/ddos-controller" >> "$GITHUB_OUTPUT"

      - name: Promote image tags
        env:
          SOURCE_TAG: ${{ inputs.source_tag }}
          RELEASE_VERSION: ${{ inputs.release_version }}
          AGENT_IMAGE: ${{ steps.img.outputs.agent }}
          CONTROLLER_IMAGE: ${{ steps.img.outputs.controller }}
        run: |
          set -euo pipefail

          MAJOR="${RELEASE_VERSION%%.*}"
          MINOR="${RELEASE_VERSION%.*}"

          for IMAGE in "$AGENT_IMAGE" "$CONTROLLER_IMAGE"; do
            docker pull "$IMAGE:$SOURCE_TAG"
            docker tag "$IMAGE:$SOURCE_TAG" "$IMAGE:$RELEASE_VERSION"
            docker tag "$IMAGE:$SOURCE_TAG" "$IMAGE:$MAJOR"
            docker tag "$IMAGE:$SOURCE_TAG" "$IMAGE:$MINOR"
            docker tag "$IMAGE:$SOURCE_TAG" "$IMAGE:latest"

            docker push "$IMAGE:$RELEASE_VERSION"
            docker push "$IMAGE:$MAJOR"
            docker push "$IMAGE:$MINOR"
            docker push "$IMAGE:latest"
          done
