name: Build & Push to GHCR

on:
  push:
    branches:
      - main
    paths:
      - "agent/**"
      - "controller/**"
      - "k8s/**"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install agent dependencies
        working-directory: agent
        run: pip install -r requirements.txt flake8

      - name: Lint agent
        working-directory: agent
        run: flake8 agent.py --max-line-length=120

      - name: Install controller dependencies
        working-directory: controller
        run: pip install -r requirements.txt flake8

      - name: Lint controller
        working-directory: controller
        run: flake8 controller.py --max-line-length=120

      - name: Set version metadata
        id: vars
        run: |
          echo "short_sha=${GITHUB_SHA::6}" >> "$GITHUB_OUTPUT"
          echo "dev_version=0.0.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image names
        id: img
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "agent=ghcr.io/$OWNER/ddos-agent" >> "$GITHUB_OUTPUT"
          echo "controller=ghcr.io/$OWNER/ddos-controller" >> "$GITHUB_OUTPUT"

      - name: Build agent image
        run: |
          docker build \
            -t ${{ steps.img.outputs.agent }}:${{ steps.vars.outputs.short_sha }} \
            -t ${{ steps.img.outputs.agent }}:${{ steps.vars.outputs.dev_version }} \
            ./agent

      - name: Build controller image
        run: |
          docker build \
            -t ${{ steps.img.outputs.controller }}:${{ steps.vars.outputs.short_sha }} \
            -t ${{ steps.img.outputs.controller }}:${{ steps.vars.outputs.dev_version }} \
            ./controller

      - name: Push agent tags
        run: |
          docker push ${{ steps.img.outputs.agent }}:${{ steps.vars.outputs.short_sha }}
          docker push ${{ steps.img.outputs.agent }}:${{ steps.vars.outputs.dev_version }}

      - name: Push controller tags
        run: |
          docker push ${{ steps.img.outputs.controller }}:${{ steps.vars.outputs.short_sha }}
          docker push ${{ steps.img.outputs.controller }}:${{ steps.vars.outputs.dev_version }}
